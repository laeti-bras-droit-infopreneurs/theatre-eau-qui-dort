<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" role="img" aria-label="Scène I">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#191426"/>
      <stop offset="1" stop-color="#0a090e"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="18%" r="70%">
      <stop offset="0" stop-color="#5c8f86" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#5c8f86" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5c8f86" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect width="900" height="1200" fill="url(#spot)"/>
  <!-- faisceau -->
  <polygon points="450,0 410,0 0,1200 270,1200" fill="#e6c983" opacity="0.05"/>
  <polygon points="450,0 490,0 900,1200 630,1200" fill="#e6c983" opacity="0.05"/>
  <!-- ondulations eau -->
  <g fill="none" stroke="#c8a24c" stroke-opacity="0.22">
    <ellipse cx="450" cy="1056" rx="126" ry="10"/>
    <ellipse cx="450" cy="1056" rx="216" ry="17" stroke-opacity="0.14"/>
    <ellipse cx="450" cy="1056" rx="306" ry="24" stroke-opacity="0.08"/>
  </g>
  <text x="450" y="552" text-anchor="middle" fill="#ece7db" font-family="Georgia, serif" font-size="75" font-style="italic" opacity="0.92">Scène I</text>
  <text x="450" y="644" text-anchor="middle" fill="#c8a24c" font-family="Arial, sans-serif" font-size="35" letter-spacing="4" opacity="0.8">PHOTO — À REMPLACER</text>
</svg>
