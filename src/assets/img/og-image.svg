<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Théâtre de l'eau qui dort">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141221"/>
      <stop offset="1" stop-color="#0a090e"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="18%" r="70%">
      <stop offset="0" stop-color="#c8a24c" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#c8a24c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c8a24c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spot)"/>
  <!-- faisceau -->
  <polygon points="600,0 560,0 0,630 360,630" fill="#e6c983" opacity="0.05"/>
  <polygon points="600,0 640,0 1200,630 840,630" fill="#e6c983" opacity="0.05"/>
  <!-- ondulations eau -->
  <g fill="none" stroke="#c8a24c" stroke-opacity="0.22">
    <ellipse cx="600" cy="554" rx="168" ry="10"/>
    <ellipse cx="600" cy="554" rx="288" ry="17" stroke-opacity="0.14"/>
    <ellipse cx="600" cy="554" rx="408" ry="24" stroke-opacity="0.08"/>
  </g>
  <text x="600" y="289" text-anchor="middle" fill="#ece7db" font-family="Georgia, serif" font-size="39" font-style="italic" opacity="0.92">Théâtre de l'eau qui dort</text>
  <text x="600" y="337" text-anchor="middle" fill="#c8a24c" font-family="Arial, sans-serif" font-size="18" letter-spacing="4" opacity="0.8">COMPAGNIE — DIFFUSION</text>
</svg>
